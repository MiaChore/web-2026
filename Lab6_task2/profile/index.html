<!DOCTYPE html>
<html>
    <head>
        <title>Profile</title>
        <meta charset="utf-8">
        <link href="../style.css" rel="stylesheet">
        </style>
    </head>
    <body class="block">
        <div class="back">
            <img src="../media/Home_page.png" alt="Home page" class="icons" style="margin-top: 32px;">
            <div>
                <img src="../media/Profile.png" alt="Profile" class="icons">
                <img src="../media/dot.png" alt="Dot" class="icons dot" style="margin-top: 45px;">
            </div>
            <img src="../media/Plus.png" alt="Add" class="icons">
       </div>
       <div class="headband">
            <h1 class="header">Легенды ПС-12</h1>
       </div>
       <div class="profile_info">
            <img src="../media/user_second.jpg" class="profile pic">
            <h2 class="profile name">Егор Шевчук</h2>
            <h3 class="profile description">Привет! Я лучший мальчик ПС-12, легенда, филантроп и 
                хочу работать в OZON </h3>
            <div class="profile pic_counter">
                <img src="../media/pic_icon.png" alt="Picture icon" class="profile pic_counter icon">
                <h3 class="profile pic_counter text">43 поста</h3>
            </div>
            <div class="profile content">
                <img src="../media/bag.png" alt="Bag" class="profile photos">
                <img src="../media/block_3.png" alt="Block" class="profile photos">
                <img src="../media/book.png" alt="Book" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../media/cake.png" alt="Cake" class="profile photos">
                <img src="../media/cola.png" alt="Cola" class="profile photos">
                <img src="../media/friends.png" alt="Friends" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../media/party.png" alt="Party" class="profile photos">
                <img src="../media/street.png" alt="Street" class="profile photos">
                <img src="../media/table.png" alt="Table" class="profile photos">
            </div>     
       </div>
    </body>
</html>
