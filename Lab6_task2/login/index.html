<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="utf-8">
        <link href="../style.css" rel="stylesheet">
        </style>
    </head>
    <body class="block">
        <div class="login_pic">
            <h1 class="title">Войти</h1>
            <img src="../media/smiling_guy.png" class="login_pic photo" alt="Smiling guy">   
        </div>
        <div class="login">
            <div class="login_input">
                <div class="login_email">
                    <h1 class="headlines">Электропочта</h1>
                    <input class="input" type="text" name="name">
                    <h1 class="description">Введите электропочту в формате *****@***.**</h1>
                </div>
                <div class="login_password">
                    <h1 class="headlines">Пароль</h1>
                    <input class="input" type="text" name="name" style="position:absolute">
                    <img src="../media/eye.png" alt="eye" class="eye" >
                </div>
            </div>
            <div>
                <button class="button"> Продолжить </button>
            </div>
        </div>    
    </body>
</html>
